<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta de Perks DBD</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body> <!-- 🚀 CAMBIO 1: Quitamos el onload de aquí, ya lo maneja el script.js -->

<div class="titulo-container">
    <img src="logo.png" alt="logo" class="logo-titulo">
    <h1>Ruleta DBD</h1>
</div>

<div class="controles">
    <!-- 🚀 CAMBIO 2: Metimos los botones SURVI y KILLER dentro de la barra de controles para ahorrar espacio vertical -->
    <div class="modo-selector">
        <button onclick="cambiarModo('survivor')" style="background: #111; padding: 6px 15px; font-size: 11px;">SURVI</button>
        <button onclick="cambiarModo('killer')" style="background: #111; padding: 6px 15px; font-size: 11px;">KILLER</button>
    </div>

    <div class="input-group">
        <label>Segundos:</label>
        <input type="number" id="inputTiempo" value="4" min="1" max="60">
    </div>

    <div class="input-group">
        <label>Volumen:</label>
        <input type="range" id="volumenControl" min="0" max="1" step="0.01" value="0.1">
    </div>

    <button id="btnGirar" onclick="iniciarRuletaAleatoria()">GIRAR RULETA</button>
    <button id="btnReiniciar" onclick="reiniciarBuild()" style="background: #333;">REINICIAR</button>
    <button onclick="mezclarPerks()" style="background: #444;">MEZCLAR</button>
</div>

<div id="mosaico" class="mosaico"></div>

<div id="resultado" class="resultado-oculto">
    <h2 id="nombreGanador"></h2>
    <div id="contenedorImagenGanadora"></div>
    <button class="btn-cerrar" onclick="cerrarResultado()">CERRAR</button>
</div>

<audio id="musicaFondo" src="musica.mp3" loop preload="auto"></audio>
<script src="script.js"></script>

</body>
</html>
